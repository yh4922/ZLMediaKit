name: Linux_ARM64

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v1

    - name: 下载submodule源码
      run: mv -f .gitmodules_github .gitmodules && git submodule sync && git submodule update --init

    - name: 下载 SRTP
      uses: actions/checkout@v2
      with:
        repository: cisco/libsrtp
        fetch-depth: 1
        ref: v2.3.0
        path: 3rdpart/libsrtp

    - name: 下载 openssl
      uses: actions/checkout@v2
      with:
        repository: openssl/openssl
        fetch-depth: 1
        ref: OpenSSL_1_1_1
        path: 3rdpart/openssl

    - name: 下载 usrsctp
      uses: actions/checkout@v2
      with:
        repository: sctplab/usrsctp
        fetch-depth: 1
        ref: 0.9.5.0
        path: 3rdpart/usrsctp

    - name: 启动 Docker 容器, 在 Docker 容器中编译 linux/arm64
      run: |
        docker pull --platform linux/arm64 ubuntu:20.04
        docker run --platform linux/arm64 -v $(pwd):/root -w /root --rm ubuntu:20.04 bash -c '
          #!/bin/bash
          set -ex

          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            git wget gcc g++ make perl python3 ca-certificates xz-utils

          # 安装 aarch64 预编译 CMake，避免从源码编译过慢
          wget -q https://github.com/Kitware/CMake/releases/download/v3.29.5/cmake-3.29.5-linux-aarch64.tar.gz
          tar -xzf cmake-3.29.5-linux-aarch64.tar.gz -C /opt
          export PATH=/opt/cmake-3.29.5-linux-aarch64/bin:$PATH
          cmake --version

          mkdir -p /root/install

          # 编译静态 openssl
          cd 3rdpart/openssl
          ./config no-shared --prefix=/root/install
          make -j$(nproc)
          make install
          cd ../../

          # 编译 usrsctp
          cd 3rdpart/usrsctp
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON ..
          make -j$(nproc)
          make install
          cd ../../../

          # 编译 libsrtp
          cd 3rdpart/libsrtp
          ./configure --enable-openssl --with-openssl-dir=/root/install
          make -j$(nproc)
          make install
          cd ../../

          # 编译 ZLMediaKit
          mkdir -p linux_build
          cd linux_build
          cmake .. -DOPENSSL_ROOT_DIR=/root/install -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
        '

    - name: 设置环境变量
      run: |
        echo "BRANCH=$(echo ${GITHUB_REF#refs/heads/} | tr -s "/\?%*:|\"<>" "_")" >> $GITHUB_ENV
        echo "BRANCH2=$(echo ${GITHUB_REF#refs/heads/} )" >> $GITHUB_ENV
        echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

    - name: 打包二进制
      id: upload
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.workflow }}_${{ env.BRANCH }}_${{ env.DATE }}
        path: release/*
        if-no-files-found: error
        retention-days: 90

    - name: issue评论
      if: github.event_name != 'pull_request' && github.ref != 'refs/heads/feature/test'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.createComment({
            issue_number: ${{vars.VERSION_ISSUE_NO}},
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '- 下载地址: [${{ github.workflow }}_${{ env.BRANCH }}_${{ env.DATE }}](${{ steps.upload.outputs.artifact-url }})\n'
              + '- 分支: ${{ env.BRANCH2 }}\n'
              + '- git hash: ${{ github.sha }} \n'
              + '- 编译日期: ${{ env.DATE }}\n'
              + '- 编译记录: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n'
              + '- 打包ci名: ${{ github.workflow }}\n'
              + '- 开启特性: openssl/webrtc/datachannel\n'
              + '- 说明: 本二进制为 linux/arm64(aarch64) 架构，在 ubuntu:20.04(arm64) 上编译，请确保目标机器为 arm64 且系统 glibc 不低于 2.31\n'
          })
